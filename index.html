<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>生命游戏</title>
        <style>
            :root {
                color-scheme: dark;
                font-family:
                    "SF Pro Display", "PingFang SC", "Microsoft YaHei",
                    sans-serif;
                background: #0a1116;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .title {
                margin: 0;
                font-size: clamp(24px, 4vw, 34px);
                font-weight: 700;
                letter-spacing: 0.04em;
            }

            .subtitle {
                margin: 0;
                color: rgba(239, 248, 255, 0.72);
                font-size: 14px;
            }

            .toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin-bottom: 12px;
            }

            canvas {
                display: block;
                width: min(92vw, 800px);
                aspect-ratio: 1;
                border: 1px solid rgba(200, 235, 255, 0.12);
                background: #08141a;
                border-radius: 12px;
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
                image-rendering: pixelated;
                touch-action: none;
            }
        </style>
    </head>
    <body>
            <main class="app">
                <div class="toolbar">
                    <button id="step" type="button">单步</button>
                    <button id="clear" type="button">清空</button>
                    <button id="autoplay" type="button">自动运行</button>
                    <button id="stop" type="button">停止</button>
                    <button id="random" type="button">随机填充</button>
                </div>

            <canvas id="game"></canvas>
        </main>

        <script type="module" src="./src/bootstrap.ts"></script>
    </body>
</html>
