<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生命游戏</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
            background:
                linear-gradient(90deg, rgba(15, 23, 42, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(15, 23, 42, 0.05) 1px, transparent 1px),
                #f7f3e8;
            background-size: 20px 20px;
            color: #151515;
            font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        }

        canvas {
            display: block;
            width: min(100%, 720px);
            aspect-ratio: 1;
            border: 3px solid #151515;
            background: #f8fafc;
            box-shadow: 10px 10px 0 #151515;
            image-rendering: pixelated;
            touch-action: none;
        }

        .app {
            display: grid;
            grid-template-columns: minmax(220px, 28vw) minmax(0, 1fr);
            min-height: 100vh;
            font-size: 14px;
        }

        .aside {
            min-height: 100vh;
            padding: 24px;
            border-right: 3px solid #151515;
            background: #fffdf4;
        }

        .panel-title {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        .panel-desc {
            margin: 0 0 22px;
            color: #4b5563;
            line-height: 1.55;
        }

        .field {
            position: relative;
            display: grid;
            gap: 8px;
        }

        .field-label,
        .states-title {
            color: #151515;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .native-select {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .select-control {
            position: relative;
        }

        .select-trigger {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 18px;
            align-items: center;
            gap: 10px;
            width: 100%;
            border: 3px solid #151515;
            border-radius: 0;
            padding: 11px 12px;
            background: #f8fafc;
            color: #151515;
            font: inherit;
            font-weight: 700;
            text-align: left;
            box-shadow: 5px 5px 0 #151515;
        }

        .select-trigger:hover,
        .select-trigger:focus-visible,
        .select-control.is-open .select-trigger {
            background: #c8ff3d;
            box-shadow: 3px 3px 0 #151515;
            transform: translate(2px, 2px);
        }

        .select-value {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .select-arrow {
            width: 12px;
            height: 12px;
            justify-self: end;
            border-right: 3px solid #151515;
            border-bottom: 3px solid #151515;
            transform: translateY(-3px) rotate(45deg);
            transition: transform 120ms steps(2);
        }

        .select-control.is-open .select-arrow {
            transform: translateY(3px) rotate(225deg);
        }

        .select-popover {
            position: absolute;
            z-index: 10;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            display: grid;
            gap: 4px;
            max-height: min(48vh, 360px);
            overflow-y: auto;
            border: 3px solid #151515;
            padding: 6px;
            background: #fffdf4;
            box-shadow: 7px 7px 0 #151515;
        }

        .select-popover[hidden] {
            display: none;
        }

        .states-panel {
            margin-top: 24px;
        }

        .state-list {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .state-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 36px;
            border: 2px solid transparent;
            border-radius: 0;
            padding: 8px;
            background: transparent;
            color: #151515;
            font: inherit;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: background 120ms steps(2), transform 120ms steps(2), box-shadow 120ms steps(2);
        }

        .state-item:hover {
            background: #e7f8b7;
        }

        .state-item.is-selected {
            border-color: #151515;
            background: #c8ff3d;
            box-shadow: 4px 4px 0 #151515;
            transform: translate(-2px, -2px);
        }

        .state-swatch {
            width: 18px;
            height: 18px;
            flex: 0 0 18px;
            border: 2px solid #151515;
            border-radius: 0;
            box-shadow: 2px 2px 0 #151515;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            min-width: 0;
            min-height: 100vh;
            padding: 32px;
            background:
                linear-gradient(135deg, transparent 0 48%, rgba(21, 21, 21, 0.08) 48% 52%, transparent 52% 100%),
                #f7f3e8;
            background-size: 24px 24px;
        }

        .toolbar {
            width: min(100%, 720px);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            border: 3px solid #151515;
            border-radius: 0;
            padding: 10px 14px;
            background: #fffdf4;
            color: #151515;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 5px 5px 0 #151515;
            transition: transform 120ms steps(2), box-shadow 120ms steps(2), background 120ms steps(2);
        }

        button:hover:not(:disabled) {
            background: #c8ff3d;
            box-shadow: 3px 3px 0 #151515;
            transform: translate(2px, 2px);
        }

        button:active:not(:disabled) {
            box-shadow: 0 0 0 #151515;
            transform: translate(5px, 5px);
        }

        button:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            box-shadow: 3px 3px 0 #9ca3af;
            border-color: #9ca3af;
        }

        .select-popover .select-option {
            width: 100%;
            border: 2px solid transparent;
            padding: 9px 10px;
            background: transparent;
            box-shadow: none;
            font-weight: 700;
            text-align: left;
            transition: background 120ms steps(2), border-color 120ms steps(2), transform 120ms steps(2);
        }

        .select-popover .select-option:hover:not(:disabled),
        .select-popover .select-option:focus-visible {
            background: #e7f8b7;
            box-shadow: none;
            transform: none;
        }

        .select-popover .select-option:active:not(:disabled) {
            box-shadow: none;
            transform: none;
        }

        .select-popover .select-option.is-selected {
            border-color: #151515;
            background: #c8ff3d;
        }

        @media (max-width: 760px) {
            .app {
                grid-template-columns: 1fr;
            }

            .aside {
                min-height: auto;
                border-right: 0;
                border-bottom: 3px solid #151515;
            }

            .main {
                min-height: auto;
                padding: 24px;
                justify-content: flex-start;
            }

            canvas {
                box-shadow: 6px 6px 0 #151515;
            }
        }
    </style>
</head>

<body>
    <div class="app">

        <aside class="aside" aria-label="自动机配置">
            <h2 class="panel-title">自动机规则</h2>
            <p class="panel-desc">选择规则后，下方会显示该规则包含的状态和对应色块。</p>

            <div class="field">
                <span class="field-label" id="automaton-select-label">当前规则</span>
                <select class="native-select" id="automaton-select" aria-hidden="true" tabindex="-1"></select>
                <div class="select-control" id="automaton-dropdown">
                    <button
                        class="select-trigger"
                        id="automaton-dropdown-button"
                        type="button"
                        aria-haspopup="listbox"
                        aria-expanded="false"
                        aria-controls="automaton-dropdown-list"
                        aria-labelledby="automaton-select-label automaton-dropdown-value"
                    >
                        <span class="select-value" id="automaton-dropdown-value">迷宫</span>
                        <span class="select-arrow" aria-hidden="true"></span>
                    </button>
                    <div
                        class="select-popover"
                        id="automaton-dropdown-list"
                        role="listbox"
                        aria-labelledby="automaton-select-label"
                        hidden
                    ></div>
                </div>
            </div>

            <section class="states-panel" aria-labelledby="states-title">
                <div class="states-title" id="states-title">状态色块</div>
                <div class="state-list" id="state-list"></div>
            </section>
        </aside>

        <main class="main">
            <div class="toolbar">
                <div class="btn-group">
                    <button id="step" type="button">单步</button>
                    <button id="autoplay" type="button">自动运行</button>
                    <button id="stop" type="button">停止</button>
                    <button id="clear" type="button">清空</button>
                </div>
            </div>

            <canvas id="game"></canvas>
        </main>

    </div>


    <script type="module" src="./src/bootstrap.ts"></script>
</body>

</html>
